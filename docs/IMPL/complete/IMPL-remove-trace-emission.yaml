waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Role
            Remove trace emission functionality from Client struct and CheckPermission method.

            ## What to Implement
            Modify `client.go` and `client_test.go` to remove all trace emission functionality
            while preserving core IAM client library functionality.

            ### Changes to client.go
            1. Remove the `traceWriter` field from the `Client` struct (line 20)
            2. Remove the `component` field from the `Client` struct (line 21)
            3. Update `NewClient` function signature from:
               ```go
               func NewClient(host string, mode AuthMode, component string) (*Client, error)
               ```
               to:
               ```go
               func NewClient(host string, mode AuthMode) (*Client, error)
               ```
            4. Remove trace writer initialization (lines 34-35):
               ```go
               // Initialize trace writer from environment
               traceWriter, _ := trace.NewWriterFromEnv()
               ```
            5. Remove component default logic (lines 37-40):
               ```go
               // Default component if empty
               if component == "" {
                   component = "unknown"
               }
               ```
            6. Remove `traceWriter` and `component` fields from Client struct initialization (lines 47-48)
            7. Remove timing tracking in `CheckPermission` method:
               - Remove `start := time.Now()` (line 59)
               - Remove `duration := time.Since(start)` (line 73)
            8. Remove trace emission call after error (line 77):
               ```go
               c.emitErrorTrace(principal, resource, permission, err, duration)
               ```
            9. Remove trace emission call after success (line 99):
               ```go
               c.emitAuthzTrace(principal, resource, permission, allowed, duration)
               ```
            10. Delete the entire `emitAuthzTrace` method (lines 104-144)
            11. Delete the entire `emitErrorTrace` method (lines 146-179)
            12. Remove the `"github.com/blackwell-systems/gcp-emulator-auth/pkg/trace"` import (line 11)

            ### Changes to client_test.go
            1. Update all `NewClient` calls to remove the third `component` parameter
            2. Lines to update: 86, 132, 152, 175, 204, 232, 263, 296, 323, 361, 396
            3. Change from: `NewClient(host, mode, "test-client")`
            4. Change to: `NewClient(host, mode)`

            ### Preserved Functionality
            - IAM client connection management (`NewClient`, `Close`)
            - Permission checking (`CheckPermission`)
            - Principal injection (`InjectPrincipalToContext`)
            - Error classification (`IsConnectivityError`, `IsConfigError`)
            - Auth mode handling (strict/permissive fail-open behavior)
            - All existing tests continue to pass

            ## Interface Contracts
            No interface contracts with other agents. This is independent removal work.

            ## Test Requirements
            All existing tests in `client_test.go` must continue to pass after removing
            the `component` parameter from `NewClient` calls. No new tests required.

            Test focus:
            - `TestNewClient`: Verify client creation without component parameter
            - `TestCheckPermission_*`: Verify permission checking continues to work
            - All 11 test functions must pass

            ## Verification Gate
            ```bash
            # Build
            go build ./...

            # Lint
            go vet ./...

            # Tests
            go test -v -race -coverprofile=coverage.out ./...

            # Postconditions
            # (a) traceWriter field removed from Client struct
            ! grep -q "traceWriter" client.go

            # (b) component parameter removed from NewClient signature
            grep -q "^func NewClient(host string, mode AuthMode) " client.go

            # (c) emitAuthzTrace method deleted
            ! grep -q "func.*emitAuthzTrace" client.go

            # (d) emitErrorTrace method deleted
            ! grep -q "func.*emitErrorTrace" client.go

            # (e) pkg/trace import removed
            ! grep -q "github.com/blackwell-systems/gcp-emulator-auth/pkg/trace" client.go

            # (f) All test calls updated (no component parameter)
            ! grep -q 'NewClient.*"test-client"' client_test.go
            ```

            ## Constraints
            - Do NOT modify files outside your ownership list (client.go, client_test.go)
            - Do NOT modify pkg/trace/types.go (shared schema, preserved for other repos)
            - Do NOT remove principal extraction helpers (ExtractPrincipalFromContext, etc.)
            - Do NOT remove error classification functions (IsConnectivityError, IsConfigError)
          files:
            - client.go
            - client_test.go
        - id: B
          task: |
            ## Role
            Delete pkg/trace Writer implementation and tests.

            ## What to Implement
            Remove the Writer implementation from pkg/trace directory. This component
            provided buffered JSONL trace output with support for stdout and file
            destinations. It is no longer needed after trace emission removal.

            ### Files to Delete
            1. `pkg/trace/writer.go` - Writer implementation with Emit/Flush/Close methods
            2. `pkg/trace/writer_test.go` - Writer tests (4 test functions)

            ### Deletion Steps
            ```bash
            rm pkg/trace/writer.go
            rm pkg/trace/writer_test.go
            ```

            ### Preserved Files
            - `pkg/trace/types.go` - Shared schema types (AuthzEvent, Actor, Target, etc.)
            - `pkg/trace/types_test.go` - Schema type tests
            - These files define the trace event schema used by other repositories in
              the blackwell-systems GCP emulator suite and must be preserved.

            ## Interface Contracts
            No interface contracts with other agents. This is independent deletion work.

            ## Test Requirements
