            ## Constraints
            - Do NOT delete pkg/trace/types.go (shared schema, must be preserved)
            - Do NOT delete pkg/trace/types_test.go (must be preserved)
            - Do NOT modify any files, only delete writer.go and writer_test.go
          files:
            - pkg/trace/writer.go
